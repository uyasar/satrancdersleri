<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkmate Pro Academy</title>
    
    <!-- Frameworks & Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase (Compatibility Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- Chess Assets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-gold { background: linear-gradient(135deg, #f59e0b, #b45309); color: #020617; font-weight: 800; transition: all 0.3s ease; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(245, 158, 11, 0.3); }
        .board-container { width: 100%; max-width: 450px; margin: 0 auto; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border-radius: 8px; overflow: hidden; border: 4px solid #1e293b; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Firebase Config & Init ---
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'chess-pro-academy';

        // --- Icon Helper ---
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { window.lucide && window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- Main App Component ---
        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('landing');
            const [adminAuth, setAdminAuth] = useState(false);
            const [courses, setCourses] = useState([]);
            const [lessons, setLessons] = useState([]);
            const [progress, setProgress] = useState({ completed: [] });
            const [selectedCourse, setSelectedCourse] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await auth.signInWithCustomToken(__initial_auth_token);
                    } else {
                        await auth.signInAnonymously();
                    }
                };
                initAuth();

                auth.onAuthStateChanged(u => {
                    setUser(u);
                    if (u) {
                        const progRef = db.collection('artifacts').doc(appId).collection('users').doc(u.uid).collection('progress').doc('main');
                        progRef.onSnapshot(doc => {
                            if (doc.exists) setProgress(doc.data());
                            else progRef.set({ completed: [] });
                        });
                    }
                });

                // Global Data Listeners
                const unsubC = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('courses')
                    .onSnapshot(snap => setCourses(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                
                const unsubL = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('lessons')
                    .onSnapshot(snap => {
                        setLessons(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                        setLoading(false);
                    });

                return () => { unsubC(); unsubL(); };
            }, []);

            const markComplete = async (lessonId) => {
                if (!user || progress.completed.includes(lessonId)) return;
                const newProgress = { completed: [...progress.completed, lessonId] };
                await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('progress').doc('main').set(newProgress);
            };

            if (loading) return (
                <div className="h-screen w-full flex items-center justify-center bg-slate-950">
                    <div className="text-amber-500 font-black tracking-[0.3em] animate-pulse">STRATEJİ YÜKLENİYOR...</div>
                </div>
            );

            return (
                <div className="min-h-screen pb-20">
                    {/* Header */}
                    <nav className="glass sticky top-0 z-50 h-20 px-8 flex items-center justify-between border-b border-white/5">
                        <div className="flex items-center gap-4 cursor-pointer" onClick={() => {setView('landing'); setAdminAuth(false);}}>
                            <div className="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center shadow-lg shadow-amber-500/20">
                                <Icon name="trophy" className="text-slate-950" />
                            </div>
                            <div>
                                <h1 className="text-xl font-black text-white leading-none">CHECKMATE</h1>
                                <p className="text-[10px] text-amber-500 font-bold tracking-widest uppercase">Academy</p>
                            </div>
                        </div>
                        <div className="hidden md:flex items-center gap-10">
                            <button onClick={() => {setView('courses'); setAdminAuth(false);}} className={`text-xs font-black tracking-widest ${view === 'courses' ? 'text-amber-500' : 'text-slate-400 hover:text-white'}`}>KURSLAR</button>
                            <button onClick={() => {setView('profile'); setAdminAuth(false);}} className={`text-xs font-black tracking-widest ${view === 'profile' ? 'text-amber-500' : 'text-slate-400 hover:text-white'}`}>GELİŞİM</button>
                            <button onClick={() => setView('admin-gate')} className={`p-2 transition-colors ${view.includes('admin') ? 'text-amber-500' : 'text-slate-500 hover:text-white'}`}><Icon name="settings" size={18}/></button>
                        </div>
                        <div className="w-10 h-10 bg-slate-800 rounded-full border border-white/10 flex items-center justify-center text-amber-500"><Icon name="user" size={18}/></div>
                    </nav>

                    <div className="container mx-auto px-6 mt-10">
                        {view === 'landing' && <Landing onStart={() => setView('courses')} />}
                        {view === 'courses' && <CoursesList courses={courses} onSelect={(c) => {setSelectedCourse(c); setView('lesson');}} />}
                        {view === 'lesson' && selectedCourse && (
                            <LessonView 
                                course={selectedCourse} 
                                lessons={lessons.filter(l => l.courseId === selectedCourse.id)} 
                                progress={progress} 
                                onComplete={markComplete} 
                                onBack={() => setView('courses')}
                            />
                        )}
                        {view === 'profile' && <ProfileView progress={progress} lessons={lessons} courses={courses} />}
                        {view === 'admin-gate' && !adminAuth && <AdminLogin onOk={() => setAdminAuth(true)} />}
                        {view === 'admin-gate' && adminAuth && <AdminPanel appId={appId} db={db} courses={courses} lessons={lessons} onLogout={() => {setAdminAuth(false); setView('landing');}} />}
                    </div>
                </div>
            );
        }

        // --- View Components ---

        function Landing({ onStart }) {
            return (
                <div className="py-20 grid lg:grid-cols-2 gap-16 items-center">
                    <div className="space-y-10">
                        <div className="inline-flex items-center gap-2 px-3 py-1 bg-amber-500/10 border border-amber-500/20 rounded-full">
                            <span className="w-2 h-2 bg-amber-500 rounded-full animate-pulse"></span>
                            <span className="text-[10px] font-black text-amber-500 tracking-widest uppercase">Pro Satranç Akademisi</span>
                        </div>
                        <h2 className="text-6xl md:text-8xl font-black leading-[0.85] tracking-tighter text-white">HER HAMLEN <br/> <span className="text-amber-500">ZAFERE</span> <br/> GİTSİN.</h2>
                        <p className="text-xl text-slate-400 max-w-lg leading-relaxed">Modern arayüz, interaktif bulmacalar ve uzman dersleri ile satrançta ustalığa yükselin.</p>
                        <button onClick={onStart} className="px-12 py-5 btn-gold rounded-2xl text-lg flex items-center gap-4">EĞİTİME BAŞLA <Icon name="arrow-right" /></button>
                    </div>
                    <div className="relative aspect-square glass rounded-[3rem] flex items-center justify-center overflow-hidden border-white/10 group">
                        <Icon name="award" size={200} className="text-amber-500 opacity-5 absolute -top-10 -left-10" />
                        <div className="text-[200px] drop-shadow-2xl group-hover:scale-110 transition-transform duration-700">♟️</div>
                    </div>
                </div>
            );
        }

        function CoursesList({ courses, onSelect }) {
            return (
                <div className="grid md:grid-cols-3 gap-8 animate-in fade-in slide-in-from-bottom-5">
                    {courses.map(c => (
                        <div key={c.id} onClick={() => onSelect(c)} className="glass p-8 rounded-[2.5rem] cursor-pointer group hover:border-amber-500/40 transition-all hover:-translate-y-2">
                            <div className="text-6xl mb-6 group-hover:scale-110 transition-transform">{c.icon || '♟️'}</div>
                            <span className="text-[10px] font-black text-amber-500 uppercase tracking-widest mb-2 block">{c.level || 'BAŞLANGIÇ'}</span>
                            <h3 className="text-2xl font-bold mb-3 group-hover:text-amber-500">{c.title}</h3>
                            <p className="text-sm text-slate-400 mb-8 line-clamp-2">{c.description}</p>
                            <div className="flex justify-between items-center text-slate-500 group-hover:text-amber-500 border-t border-white/5 pt-6">
                                <span className="text-[10px] font-black uppercase">Derse Gir</span>
                                <Icon name="chevron-right" />
                            </div>
                        </div>
                    ))}
                    {courses.length === 0 && <div className="col-span-3 text-center py-20 opacity-20 italic">Henüz kurs tanımlanmadı.</div>}
                </div>
            );
        }

        function LessonView({ course, lessons, progress, onComplete, onBack }) {
            const [activeLesson, setActiveLesson] = useState(lessons[0] || null);
            const [mode, setMode] = useState('video');
            const [solved, setSolved] = useState(false);

            useEffect(() => {
                let board = null;
                if (mode === 'puzzle' && activeLesson) {
                    const timer = setTimeout(() => {
                        const el = document.getElementById('chess-board');
                        if (el && window.Chessboard) {
                            board = window.Chessboard('chess-board', {
                                draggable: true,
                                position: activeLesson.fen || 'start',
                                onDrop: () => setSolved(true)
                            });
                        }
                    }, 200);
                    return () => { clearTimeout(timer); if (board) board.destroy(); };
                }
            }, [mode, activeLesson]);

            if (!activeLesson) return <div className="text-center py-20 opacity-30 italic">Kurs içeriği hazırlanıyor...</div>;

            return (
                <div className="grid lg:grid-cols-12 gap-10">
                    {/* Sidebar */}
                    <div className="lg:col-span-3 space-y-6">
                        <button onClick={onBack} className="flex items-center gap-3 text-xs font-black text-slate-500 hover:text-white uppercase tracking-widest"><Icon name="arrow-left" size={14}/> Geri</button>
                        <div className="glass rounded-[2rem] overflow-hidden">
                            <div className="p-6 border-b border-white/5 bg-white/5 font-black text-amber-500 text-xs tracking-widest">{course.title}</div>
                            <div className="max-h-[500px] overflow-y-auto custom-scrollbar">
                                {lessons.map((l, idx) => (
                                    <button key={l.id} onClick={() => {setActiveLesson(l); setSolved(false); setMode('video');}} className={`w-full p-5 flex items-center gap-4 transition-all border-l-4 ${activeLesson.id === l.id ? 'bg-amber-500/10 border-amber-500' : 'border-transparent hover:bg-white/5'}`}>
                                        <div className={`w-8 h-8 rounded-lg flex items-center justify-center text-[10px] font-bold ${progress.completed.includes(l.id) ? 'bg-green-500 text-slate-950' : 'bg-slate-800 text-slate-500'}`}>
                                            {progress.completed.includes(l.id) ? <Icon name="check" size={14}/> : idx + 1}
                                        </div>
                                        <span className="text-sm font-bold truncate text-left">{l.title}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                    {/* Content Area */}
                    <div className="lg:col-span-9 glass p-10 rounded-[3rem]">
                        <div className="flex flex-wrap justify-between items-center mb-10 gap-6">
                            <h2 className="text-3xl font-black text-white">{activeLesson.title}</h2>
                            <div className="flex bg-slate-950 p-1.5 rounded-2xl border border-white/10">
                                <button onClick={() => setMode('video')} className={`flex items-center gap-2 px-6 py-3 rounded-xl text-[10px] font-black ${mode === 'video' ? 'bg-amber-500 text-slate-950' : 'text-slate-500'}`}><Icon name="video" size={14}/> VİDEO</button>
                                <button onClick={() => setMode('puzzle')} className={`flex items-center gap-2 px-6 py-3 rounded-xl text-[10px] font-black ${mode === 'puzzle' ? 'bg-amber-500 text-slate-950' : 'text-slate-500'}`}><Icon name="target" size={14}/> UYGULAMA</button>
                            </div>
                        </div>
                        {mode === 'video' ? (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                <div className="aspect-video bg-black rounded-[2rem] overflow-hidden border border-white/10 flex items-center justify-center group">
                                    {activeLesson.videoUrl ? (
                                        <iframe className="w-full h-full" src={activeLesson.videoUrl.replace('watch?v=', 'embed/')} allowFullScreen></iframe>
                                    ) : (
                                        <div className="text-center opacity-20"><Icon name="play-circle" size={80} /><p className="mt-4 font-black text-xs uppercase tracking-widest">Video Hazırlanıyor</p></div>
                                    )}
                                </div>
                                <div className="bg-slate-950/50 p-8 rounded-3xl border border-white/5 text-lg text-slate-400 leading-relaxed">{activeLesson.content}</div>
                                <div className="flex justify-end"><button onClick={() => setMode('puzzle')} className="px-10 py-4 btn-gold rounded-2xl">UYGULAMAYA GEÇ <Icon name="arrow-right" className="inline ml-2"/></button></div>
                            </div>
                        ) : (
                            <div className="grid lg:grid-cols-2 gap-16 items-center animate-in slide-in-from-right-8 duration-500">
                                <div className="space-y-8">
                                    <div className="p-8 bg-slate-950/80 border border-white/10 rounded-3xl shadow-inner">
                                        <span className="text-[10px] font-black text-amber-500 uppercase tracking-widest block mb-4">Görev</span>
                                        <p className="text-2xl font-bold">{activeLesson.instruction || "Doğru hamleyi bulup tahta üzerinde uygula."}</p>
                                    </div>
                                    {solved && (
                                        <div className="p-8 bg-green-500/10 border border-green-500/20 rounded-3xl animate-bounce">
                                            <p className="text-green-500 font-black flex items-center gap-3 text-xl"><Icon name="award" size={24}/> HARİKA HAMLE!</p>
                                            <button onClick={() => onComplete(activeLesson.id)} className="mt-6 w-full py-4 bg-green-500 text-slate-950 font-black rounded-2xl">BÖLÜMÜ TAMAMLA</button>
                                        </div>
                                    )}
                                </div>
                                <div className="board-container"><div id="chess-board"></div></div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function AdminLogin({ onOk }) {
            const [pw, setPw] = useState('');
            const check = (e) => { e.preventDefault(); if(pw === '123456') onOk(); else alert('Hatalı Şifre!'); };
            return (
                <div className="max-w-md mx-auto mt-20 glass p-10 rounded-[2.5rem] animate-in zoom-in-95">
                    <div className="text-center mb-10"><div className="w-16 h-16 bg-amber-500/10 text-amber-500 rounded-2xl flex items-center justify-center mx-auto mb-4"><Icon name="shield" size={32}/></div><h2 className="text-2xl font-black">Yönetici Girişi</h2><p className="text-slate-500 text-sm mt-1">Lütfen kontrol panel şifresini girin.</p></div>
                    <form onSubmit={check} className="space-y-6">
                        <input type="password" value={pw} onChange={e => setPw(e.target.value)} placeholder="••••••" className="w-full p-4 bg-slate-900 border border-white/5 rounded-2xl outline-none focus:border-amber-500 text-center text-xl tracking-widest" />
                        <button type="submit" className="w-full py-4 btn-gold rounded-2xl">GİRİŞ YAP</button>
                    </form>
                </div>
            );
        }

        function AdminPanel({ appId, db, courses, onLogout }) {
            const [add, setAdd] = useState(false);
            const save = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('courses').add({
                    title: fd.get('title'),
                    description: fd.get('description'),
                    level: fd.get('level'),
                    icon: fd.get('icon') || '♟️'
                });
                setAdd(false);
            };
            const del = async (id) => { if(confirm('Silinsin mi?')) await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('courses').doc(id).delete(); };

            return (
                <div className="glass p-10 rounded-[3rem] animate-in slide-in-from-bottom-5">
                    <div className="flex justify-between items-center mb-12">
                        <h3 className="text-3xl font-black">Sistem Yönetimi</h3>
                        <div className="flex gap-4"><button onClick={() => setAdd(!add)} className="px-6 py-3 btn-gold rounded-xl text-xs uppercase">Yeni Kurs</button><button onClick={onLogout} className="px-6 py-3 bg-red-500/10 text-red-500 rounded-xl text-xs font-bold uppercase tracking-widest border border-red-500/20">Çıkış</button></div>
                    </div>
                    {add && (
                        <form onSubmit={save} className="grid grid-cols-2 gap-6 p-8 bg-slate-950 rounded-3xl border border-amber-500/20 mb-10">
                            <input name="title" placeholder="Kurs Başlığı" className="p-4 bg-slate-900 border border-white/5 rounded-xl outline-none focus:border-amber-500" required />
                            <input name="icon" placeholder="Emoji (Örn: 🏰)" className="p-4 bg-slate-900 border border-white/5 rounded-xl outline-none focus:border-amber-500" />
                            <select name="level" className="p-4 bg-slate-900 border border-white/5 rounded-xl outline-none focus:border-amber-500"><option value="BAŞLANGIÇ">Başlangıç</option><option value="ORTA">Orta</option><option value="İLERİ">İleri</option></select>
                            <input name="description" placeholder="Açıklama" className="p-4 bg-slate-900 border border-white/5 rounded-xl outline-none focus:border-amber-500" required />
                            <button type="submit" className="col-span-2 py-4 btn-gold rounded-xl">KAYDET</button>
                        </form>
                    )}
                    <div className="space-y-4">
                        {courses.map(c => (
                            <div key={c.id} className="p-6 bg-white/5 rounded-2xl flex justify-between items-center group">
                                <div className="flex items-center gap-6"><span className="text-4xl">{c.icon}</span><div><h6 className="font-bold text-lg">{c.title}</h6><span className="text-[10px] font-black text-slate-500 uppercase">{c.level}</span></div></div>
                                <button onClick={() => del(c.id)} className="p-3 text-slate-600 hover:text-red-500 transition-opacity opacity-0 group-hover:opacity-100"><Icon name="trash-2" size={20}/></button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function ProfileView({ progress, lessons }){
            const done = progress.completed.length;
            const total = lessons.length;
            return (
                <div className="max-w-4xl mx-auto glass p-12 rounded-[3rem] flex flex-col md:flex-row items-center gap-12 relative overflow-hidden">
                    <Icon name="trophy" size={300} className="absolute -right-20 -bottom-20 text-amber-500 opacity-5 rotate-12" />
                    <div className="w-40 h-40 bg-amber-500 rounded-[2.5rem] flex items-center justify-center shadow-2xl shadow-amber-500/30 text-slate-950"><Icon name="user" size={80}/></div>
                    <div className="text-center md:text-left space-y-6">
                        <h2 className="text-4xl font-black">GELİŞİM RAPORU</h2>
                        <div className="flex gap-6 justify-center md:justify-start">
                            <div className="glass px-8 py-4 rounded-2xl text-center"><span className="text-[10px] font-black text-slate-500 uppercase block mb-1">Dersler</span><span className="text-3xl font-black text-amber-500">{done} / {total}</span></div>
                            <div className="glass px-8 py-4 rounded-2xl text-center"><span className="text-[10px] font-black text-slate-500 uppercase block mb-1">Başarı</span><span className="text-3xl font-black text-amber-500">%{total > 0 ? Math.round((done/total)*100) : 0}</span></div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
