<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satranç Dersleri — Kraliyet oyununu öğren</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ─── RESET & BASE ─────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg-alt: #fafafa;
    --bg-soft: #f5f5f5;
    --ink: #0a0a0a;
    --ink-2: #1a1a1a;
    --ink-3: #525252;
    --ink-4: #737373;
    --ink-5: #a3a3a3;
    --line: #e5e5e5;
    --line-soft: #f0f0f0;
    --accent: #0a0a0a;
    --success: #16a34a;
    --error: #dc2626;
    --warn: #ea580c;
    --light-sq: #f5f5f5;
    --dark-sq: #d4d4d4;
    --r: 8px;
    --r-sm: 4px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 4px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 24px 48px -16px rgba(0,0,0,0.12);
  }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.01em;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input { font-family: inherit; }
  ::selection { background: var(--ink); color: var(--bg); }

  /* ─── LAYOUT ───────────────────────────────────────────── */
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  @media (min-width: 768px) { .container { padding: 0 32px; } }

  /* ─── NAV ──────────────────────────────────────────────── */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255,255,255,0.85);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0; gap: 24px;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; font-size: 16px; letter-spacing: -0.02em;
  }
  .logo-mark {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--ink); color: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .nav-links { display: none; gap: 4px; }
  @media (min-width: 768px) { .nav-links { display: flex; } }
  .nav-link {
    padding: 8px 14px; font-size: 14px; font-weight: 500; color: var(--ink-3);
    border-radius: var(--r-sm); transition: all 150ms;
  }
  .nav-link:hover { color: var(--ink); }
  .nav-link.active { color: var(--ink); background: var(--bg-soft); }
  .nav-actions { display: flex; align-items: center; gap: 8px; }
  .nav-burger { display: flex; padding: 8px; }
  @media (min-width: 768px) { .nav-burger { display: none; } }

  .nav-mobile {
    display: none;
    border-top: 1px solid var(--line);
    background: var(--bg);
    padding: 8px 0;
  }
  .nav-mobile.open { display: block; }
  .nav-mobile a {
    display: block; padding: 12px 24px; font-size: 14px; color: var(--ink-3);
    text-decoration: none; font-weight: 500;
  }
  .nav-mobile a.active { color: var(--ink); background: var(--bg-soft); }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--ink); color: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
  }
  .user-pill {
    display: flex; align-items: center; gap: 10px; padding: 4px 12px 4px 4px;
    border-radius: 999px; transition: background 150ms;
  }
  .user-pill:hover { background: var(--bg-soft); }
  .user-name { font-size: 14px; font-weight: 500; }

  /* ─── BUTTONS ──────────────────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px; padding: 10px 18px; font-size: 14px; font-weight: 500;
    border-radius: 999px; transition: all 150ms;
    white-space: nowrap;
  }
  .btn-primary { background: var(--ink); color: var(--bg); }
  .btn-primary:hover { background: var(--ink-2); transform: translateY(-1px); }
  .btn-primary:disabled { background: var(--ink-5); cursor: not-allowed; transform: none; }
  .btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
  .btn-ghost:hover { border-color: var(--ink); }
  .btn-soft { background: var(--bg-soft); color: var(--ink); }
  .btn-soft:hover { background: var(--line); }
  .btn-lg { padding: 14px 24px; font-size: 15px; }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .btn-icon { padding: 8px; min-width: 36px; }

  /* ─── HERO ─────────────────────────────────────────────── */
  .hero { padding: 80px 0 80px; }
  @media (min-width: 768px) { .hero { padding: 120px 0 100px; } }
  .hero-grid {
    display: grid; gap: 60px; align-items: center;
    grid-template-columns: 1fr;
  }
  @media (min-width: 1024px) {
    .hero-grid { grid-template-columns: 1.2fr 1fr; gap: 80px; }
  }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 500; color: var(--ink-4);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 24px;
  }
  .eyebrow::before {
    content: ''; width: 24px; height: 1px; background: var(--ink-4);
  }
  .hero h1 {
    font-size: clamp(40px, 7vw, 72px);
    font-weight: 500;
    line-height: 1.02;
    letter-spacing: -0.04em;
    color: var(--ink);
    margin-bottom: 24px;
  }
  .hero h1 em {
    font-style: italic; font-weight: 400;
    color: var(--ink-3);
  }
  .hero p.lead {
    font-size: 17px; line-height: 1.6; color: var(--ink-3);
    max-width: 480px; margin-bottom: 32px;
  }
  .hero-actions { display: flex; flex-wrap: wrap; gap: 12px; }
  .hero-stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px;
    margin-top: 56px; padding-top: 32px;
    border-top: 1px solid var(--line);
    max-width: 480px;
  }
  .stat-num {
    font-size: 28px; font-weight: 500; letter-spacing: -0.02em;
    color: var(--ink); line-height: 1;
  }
  .stat-label {
    font-size: 12px; color: var(--ink-4); margin-top: 6px;
    letter-spacing: 0.02em;
  }
  .hero-board-wrap {
    display: flex; justify-content: center; align-items: center;
    position: relative;
  }

  /* ─── BOARD ────────────────────────────────────────────── */
  .board {
    display: inline-block;
    padding: 12px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--r);
    box-shadow: var(--shadow-lg);
  }
  .board-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    border-radius: var(--r-sm);
    overflow: hidden;
  }
  .square {
    aspect-ratio: 1; position: relative;
    display: flex; align-items: center; justify-content: center;
    width: 44px; height: 44px;
    transition: background 100ms;
    border: none; padding: 0;
  }
  @media (min-width: 640px) { .square { width: 52px; height: 52px; } }
  @media (min-width: 768px) { .square { width: 58px; height: 58px; } }
  .square.light { background: var(--light-sq); }
  .square.dark { background: var(--dark-sq); }
  .square.clickable { cursor: pointer; }
  .square.clickable:hover { filter: brightness(0.95); }
  .square.selected::before {
    content: ''; position: absolute; inset: 0;
    box-shadow: inset 0 0 0 3px var(--ink);
    z-index: 2;
  }
  .square.highlight::after {
    content: ''; position: absolute; inset: 8px;
    border-radius: 50%;
    background: rgba(10,10,10,0.12);
    border: 2px solid var(--ink);
    z-index: 1;
  }
  .piece {
    font-size: 32px; line-height: 1;
    user-select: none; pointer-events: none;
    position: relative; z-index: 3;
    transition: transform 120ms;
  }
  @media (min-width: 640px) { .piece { font-size: 38px; } }
  @media (min-width: 768px) { .piece { font-size: 42px; } }
  .piece.white { color: #ffffff; text-shadow: 0 1px 2px rgba(0,0,0,0.3), 0 0 1px rgba(0,0,0,0.6); }
  .piece.black { color: var(--ink); }
  .square.selected .piece { transform: scale(1.1); }
  .coord {
    position: absolute; font-size: 9px; font-weight: 600;
    color: var(--ink-4); pointer-events: none; z-index: 1;
  }
  .coord-rank { left: 3px; top: 2px; }
  .coord-file { right: 3px; bottom: 2px; }

  /* ─── SECTIONS ─────────────────────────────────────────── */
  .section { padding: 80px 0; }
  @media (min-width: 768px) { .section { padding: 120px 0; } }
  .section-alt { background: var(--bg-alt); }
  .section h2 {
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 500; letter-spacing: -0.03em; line-height: 1.05;
    margin-bottom: 24px;
  }
  .section h2 em { font-style: italic; font-weight: 400; color: var(--ink-3); }
  .section-lead {
    font-size: 17px; color: var(--ink-3); line-height: 1.6;
    max-width: 600px; margin-bottom: 56px;
  }

  /* ─── FEATURE GRID ─────────────────────────────────────── */
  .features {
    display: grid; gap: 1px; background: var(--line);
    border: 1px solid var(--line);
    border-radius: var(--r);
    overflow: hidden;
  }
  @media (min-width: 640px) { .features { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 1024px) { .features { grid-template-columns: repeat(4, 1fr); } }
  .feature {
    background: var(--bg); padding: 32px;
  }
  .feature-icon {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--bg-soft); display: flex;
    align-items: center; justify-content: center;
    margin-bottom: 20px;
  }
  .feature h3 {
    font-size: 17px; font-weight: 500; margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .feature p { font-size: 14px; color: var(--ink-4); line-height: 1.6; }

  /* ─── AUDIENCE CARDS ───────────────────────────────────── */
  .audiences { display: grid; gap: 16px; }
  @media (min-width: 768px) { .audiences { grid-template-columns: 1fr 1fr; } }
  .audience-card {
    padding: 40px 32px; border-radius: var(--r);
    background: var(--bg); border: 1px solid var(--line);
    transition: all 200ms; text-align: left; width: 100%; cursor: pointer;
  }
  @media (min-width: 768px) { .audience-card { padding: 56px 40px; } }
  .audience-card:hover {
    transform: translateY(-2px); box-shadow: var(--shadow);
    border-color: var(--ink-5);
  }
  .audience-card.dark { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .audience-card.dark:hover { border-color: var(--ink); }
  .audience-card .age {
    font-size: 12px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 16px; opacity: 0.6;
  }
  .audience-card h3 {
    font-size: clamp(28px, 4vw, 40px); font-weight: 500;
    letter-spacing: -0.03em; line-height: 1; margin-bottom: 16px;
  }
  .audience-card p {
    font-size: 15px; line-height: 1.6; opacity: 0.75;
    margin-bottom: 32px;
  }
  .audience-card .more {
    font-size: 14px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 6px;
  }

  /* ─── COURSES PAGE ─────────────────────────────────────── */
  .page-header {
    padding: 60px 0 40px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 48px;
  }
  .page-header h1 {
    font-size: clamp(40px, 6vw, 64px);
    font-weight: 500; letter-spacing: -0.04em; line-height: 1;
  }
  .page-header h1 em { font-style: italic; font-weight: 400; color: var(--ink-3); }
  .filters {
    display: flex; gap: 4px; margin-bottom: 32px; flex-wrap: wrap;
    padding: 4px; background: var(--bg-soft);
    border-radius: 999px; width: fit-content;
  }
  .filter {
    padding: 8px 18px; font-size: 14px; font-weight: 500;
    color: var(--ink-3); border-radius: 999px;
    transition: all 150ms;
  }
  .filter.active { background: var(--bg); color: var(--ink); box-shadow: var(--shadow-sm); }

  .course-grid {
    display: grid; gap: 20px;
  }
  @media (min-width: 640px) { .course-grid { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 1024px) { .course-grid { grid-template-columns: repeat(3, 1fr); } }
  .course-card {
    background: var(--bg); border: 1px solid var(--line);
    border-radius: var(--r); overflow: hidden;
    display: flex; flex-direction: column;
    transition: all 200ms;
  }
  .course-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--ink-5); }
  .course-cover {
    height: 140px; background: var(--bg-soft);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    border-bottom: 1px solid var(--line);
  }
  .course-cover-icon { font-size: 56px; color: var(--ink-5); }
  .course-cover-tags {
    position: absolute; top: 12px; left: 12px; right: 12px;
    display: flex; justify-content: space-between;
  }
  .tag {
    padding: 4px 10px; font-size: 11px; font-weight: 500;
    border-radius: 999px; letter-spacing: 0.02em;
  }
  .tag-light { background: var(--bg); color: var(--ink); border: 1px solid var(--line); }
  .tag-dark { background: var(--ink); color: var(--bg); }
  .tag-success { background: var(--success); color: white; }
  .tag-warn { background: var(--warn); color: white; }

  .course-body { padding: 24px; flex: 1; display: flex; flex-direction: column; }
  .course-body h3 {
    font-size: 18px; font-weight: 500; margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .course-instructor {
    font-size: 12px; color: var(--ink-4); margin-bottom: 12px;
  }
  .course-desc {
    font-size: 14px; color: var(--ink-3); line-height: 1.55;
    margin-bottom: 16px; flex: 1;
  }
  .course-meta {
    display: flex; gap: 16px; font-size: 12px; color: var(--ink-4);
    margin-bottom: 16px;
  }
  .course-meta-item { display: flex; align-items: center; gap: 4px; }
  .progress {
    margin-bottom: 16px;
  }
  .progress-row {
    display: flex; justify-content: space-between; font-size: 12px;
    color: var(--ink-4); margin-bottom: 6px;
  }
  .progress-bar {
    height: 4px; background: var(--bg-soft); border-radius: 999px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--ink);
    transition: width 400ms;
  }

  /* ─── COURSE DETAIL ────────────────────────────────────── */
  .back-link {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 13px; color: var(--ink-4); margin-bottom: 32px;
    transition: color 150ms;
  }
  .back-link:hover { color: var(--ink); }

  .course-detail-grid {
    display: grid; gap: 40px; margin-bottom: 56px;
  }
  @media (min-width: 1024px) { .course-detail-grid { grid-template-columns: 2fr 1fr; gap: 60px; } }
  .course-detail-grid .meta-row {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .course-detail h1 {
    font-size: clamp(32px, 5vw, 48px);
    font-weight: 500; letter-spacing: -0.03em; line-height: 1.05;
    margin-bottom: 20px;
  }
  .course-detail .desc {
    font-size: 17px; color: var(--ink-3); line-height: 1.6;
    max-width: 560px; margin-bottom: 24px;
  }
  .course-detail .info-row {
    display: flex; gap: 24px; flex-wrap: wrap;
    font-size: 14px; color: var(--ink-4);
  }
  .course-detail .info-row > * {
    display: flex; align-items: center; gap: 6px;
  }
  .progress-card {
    padding: 24px; border: 1px solid var(--line); border-radius: var(--r);
    background: var(--bg);
  }
  .progress-card .label {
    font-size: 12px; font-weight: 500; color: var(--ink-4);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px;
  }
  .progress-card .big {
    font-size: 48px; font-weight: 500; letter-spacing: -0.03em;
    color: var(--ink); line-height: 1;
  }
  .progress-card .small { font-size: 14px; color: var(--ink-4); margin-top: 8px; }

  .lesson-list {
    border: 1px solid var(--line); border-radius: var(--r);
    overflow: hidden; background: var(--bg);
  }
  .lesson-row {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 20px; border-bottom: 1px solid var(--line-soft);
  }
  .lesson-row:last-child { border-bottom: none; }
  .lesson-row.done { background: var(--bg-alt); }
  .lesson-num {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--bg-soft); color: var(--ink-3);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500; flex-shrink: 0;
  }
  .lesson-num.done { background: var(--success); color: white; }
  .lesson-num.locked { color: var(--ink-5); }
  .lesson-info { flex: 1; min-width: 0; }
  .lesson-title { font-size: 15px; font-weight: 500; color: var(--ink); }
  .lesson-title.locked { color: var(--ink-4); }
  .lesson-meta { font-size: 12px; color: var(--ink-4); margin-top: 2px; }

  /* ─── LESSON PLAYER ────────────────────────────────────── */
  .lesson-player {
    background: var(--bg); border: 1px solid var(--line);
    border-radius: var(--r); overflow: hidden;
  }
  .lesson-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; border-bottom: 1px solid var(--line);
    background: var(--bg-alt);
  }
  .lesson-progress-track { height: 2px; background: var(--bg-soft); }
  .lesson-progress-fill { height: 100%; background: var(--ink); transition: width 400ms; }
  .lesson-content {
    display: grid; gap: 32px; padding: 32px 24px;
  }
  @media (min-width: 768px) { .lesson-content { padding: 48px 40px; gap: 48px; } }
  @media (min-width: 1024px) {
    .lesson-content { grid-template-columns: 1.4fr 1fr; }
  }
  .lesson-board-wrap { display: flex; justify-content: center; align-items: flex-start; }
  .scene-tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    border-radius: 999px; margin-bottom: 20px;
  }
  .scene-tag.show { background: var(--bg-soft); color: var(--ink); }
  .scene-tag.try { background: var(--ink); color: var(--bg); }
  .scene-title {
    font-size: clamp(24px, 3.5vw, 32px); font-weight: 500;
    letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 16px;
  }
  .scene-text {
    font-size: 15px; line-height: 1.65; color: var(--ink-3);
    margin-bottom: 24px;
  }
  .alert {
    padding: 14px 16px; border-radius: var(--r);
    display: flex; gap: 10px; align-items: flex-start;
    margin-bottom: 16px; font-size: 14px;
  }
  .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
  .alert-error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
  .alert-hint { background: #fff7ed; color: #9a3412; border: 1px solid #fed7aa; }
  .alert .icon { flex-shrink: 0; margin-top: 1px; }
  .alert .label {
    font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 2px;
  }
  .lesson-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* ─── PUZZLES ──────────────────────────────────────────── */
  .puzzle-stats {
    display: flex; gap: 0; border: 1px solid var(--line);
    border-radius: 999px; padding: 4px; background: var(--bg);
  }
  .puzzle-stat {
    padding: 6px 16px;
    border-right: 1px solid var(--line);
  }
  .puzzle-stat:last-child { border-right: none; }
  .puzzle-stat-v {
    font-size: 18px; font-weight: 500; letter-spacing: -0.01em;
    line-height: 1;
  }
  .puzzle-stat-l {
    font-size: 10px; color: var(--ink-4); text-transform: uppercase;
    letter-spacing: 0.08em; margin-top: 3px;
  }
  .puzzle-frame {
    background: var(--bg); border: 1px solid var(--line);
    border-radius: var(--r); padding: 32px;
    display: grid; gap: 32px;
  }
  @media (min-width: 768px) { .puzzle-frame { padding: 48px; gap: 48px; } }
  @media (min-width: 1024px) {
    .puzzle-frame { grid-template-columns: 1.4fr 1fr; }
  }
  .puzzle-board-wrap { display: flex; justify-content: center; align-items: flex-start; }
  .puzzle-prompt {
    font-size: clamp(22px, 3vw, 30px); font-weight: 500;
    letter-spacing: -0.02em; line-height: 1.15;
    margin-bottom: 16px;
  }
  .puzzle-hint-text {
    font-size: 13px; color: var(--ink-4); margin-bottom: 24px;

let activeLesson = null;

// scene/puzzle local state
let scenePos = null;

let sceneFeedback = null;
let sceneSolved = false;
let sceneShowHint = false;

let puzzlePos = null;
let puzzleSelected = null;
let puzzleSolved = false;

let puzzleAttempts = 0;

function updateState(updater) {
  state = typeof updater === 'function' ? updater(state) : { ...state, ...updater };
  Store.save(state);
  render();
}

function setView(v) {
  view = v;
  mobileNavOpen = false;
  window.scrollTo({ top: 0, behavior: 'instant' });
  render();
}

function openCourse(id) {
  activeCourseId = id;
  setView('course');
}

function openLesson(lesson, courseId) {
  activeLesson = lesson;
  activeSceneIdx = 0;
  if (courseId) activeCourseId = courseId;
  initSceneState();
  setView('lesson');
}

function initSceneState() {
  const scene = activeLesson.scenes[activeSceneIdx];
  scenePos = { ...scene.position };
  sceneSelected = null;
  sceneFeedback = null;
  sceneSolved = scene.type !== 'try';
  sceneShowHint = false;
}

function initPuzzleState() {
  const p = PUZZLES[activePuzzleIdx];
  puzzlePos = { ...p.position };
  puzzleSelected = null;
  puzzleSolved = state.solvedPuzzles.includes(p.id);
  puzzleFeedback = null;
  puzzleShowHint = false;
  puzzleAttempts = 0;
}

function logout() {
  updateState(s => ({ ...s, user: null }));
  setView('home');
}

// HELPERS
// ═══════════════════════════════════════════════════════════════
function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function isUpper(c) { return c && c === c.toUpperCase(); }
function fmtMin(m) {
  if (m >= 60) return (Math.round(m / 6) / 10) + ' sa';
  return m + ' dk';
}
function timeAgo(ts) {
  const h = (Date.now() - ts) / 36e5;
  if (h < 1) return Math.max(1, Math.round(h * 60)) + ' dk önce';
  if (h < 24) return Math.round(h) + ' sa önce';
  return Math.round(h / 24) + ' gün önce';
}
function courseProgress(id) {
  const lessons = LESSONS[id] || [];
  if (!lessons.length) return 0;
  const done = lessons.filter(l => state.completedLessons.includes(l.id)).length;
  return Math.round((done / lessons.length) * 100);
}
function calcStreak() {
  if (!state.activity.length) return 0;
  const dates = new Set(state.activity.map(a => new Date(a.ts).toDateString()));
  let s = 0; let d = new Date();
  while (dates.has(d.toDateString())) { s++; d.setDate(d.getDate() - 1); }
  return s;
}

// BOARD RENDERER
// ═══════════════════════════════════════════════════════════════
function renderBoard(opts) {
  const { position, selected, highlights = [], onClick } = opts;
  let html = '<div class="board"><div class="board-grid">';
  for (const r of RANKS) {
    for (const f of FILES) {
      const sq = f + r;
      const isLight = (FILES.indexOf(f) + r) % 2 === 1;
      const piece = position[sq];
      const isWhite = piece && isUpper(piece);
      const cls = ['square', isLight ? 'light' : 'dark'];
      if (onClick) cls.push('clickable');
      if (selected === sq) cls.push('selected');
      if (highlights.includes(sq)) cls.push('highlight');
      const handler = onClick ? `data-board-click="${onClick}" data-square="${sq}"` : '';
      html += `<button class="${cls.join(' ')}" ${handler}>`;
      if (f === 'a') html += `<span class="coord coord-rank">${r}</span>`;
      if (r === 1) html += `<span class="coord coord-file">${f}</span>`;
      if (piece) {
        html += `<span class="piece ${isWhite ? 'white' : 'black'}">${GLYPH[piece]}</span>`;
      }
      html += '</button>';
    }
  }
  html += '</div></div>';
  return html;
}

                    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
                  </div>
                ` : ''}
                ${cta}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

  const progress = lessons.length ? Math.round((completed / lessons.length) * 100) : 0;
  const totalMin = lessons.reduce((s, l) => s + l.duration, 0);

  return `
    <div class="container" style="padding-top: 40px;">

              </div>

      <div class="lesson-list">
        ${lessons.map((l, idx) => {
          const done = state.completedLessons.includes(l.id);
          const prevDone = idx === 0 || state.completedLessons.includes(lessons[idx - 1].id);
          const locked = !prevDone && !done;
          const numCls = done ? 'done' : locked ? 'locked' : '';
          const numContent = done ? Icon.check : locked ? Icon.lock : (idx + 1);
          const btn = locked
            ? `<button class="btn btn-soft btn-sm" disabled>${Icon.lock} Kilitli</button>`
            : done
              ? `<button class="btn btn-ghost btn-sm" data-open-lesson="${l.id}">${Icon.rotate} Tekrar</button>`
              : `<button class="btn btn-primary btn-sm" data-open-lesson="${l.id}">Başla ${Icon.arrow}</button>`;

          return `
            <div class="lesson-row ${done ? 'done' : ''}">
              <div class="lesson-num ${numCls}">${numContent}</div>
              <div class="lesson-info">
                <div class="lesson-title ${locked ? 'locked' : ''}">${escapeHtml(l.title)}</div>
                <div class="lesson-meta">${l.scenes.length} sahne · ${l.duration} dakika${done ? ' · Tamamlandı' : ''}</div>
              </div>
              ${btn}
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function lessonView() {
  if (!activeLesson) return '<div class="container"><p>Ders bulunamadı.</p></div>';
  const scene = activeLesson.scenes[activeSceneIdx];
  const isLast = activeSceneIdx === activeLesson.scenes.length - 1;
  const progress = ((activeSceneIdx + (sceneSolved ? 1 : 0)) / activeLesson.scenes.length) * 100;

  let alertHtml = '';
  if (sceneFeedback?.type === 'success') {
    alertHtml = `<div class="alert alert-success">
      <span class="icon">${Icon.checkCircle}</span><div>${escapeHtml(sceneFeedback.msg)}</div>
    </div>`;
  } else if (sceneFeedback?.type === 'error') {
    alertHtml = `<div class="alert alert-error">
      <span class="icon">${Icon.x}</span><div>${escapeHtml(sceneFeedback.msg)}</div>
    </div>`;
  }
  if (sceneShowHint && scene.hint) {
    alertHtml += `<div class="alert alert-hint">
      <span class="icon">${Icon.bulb}</span>
      <div><div class="label">İpucu</div>${escapeHtml(scene.hint)}</div>
    </div>`;
  }

  let actions = '';
  if (activeSceneIdx > 0) {
    actions += `<button class="btn btn-ghost btn-sm" data-action="scene-prev">${Icon.arrowLeft} Önceki</button>`;
  }
  if (scene.type === 'try' && !sceneSolved && !sceneShowHint) {
    actions += `<button class="btn btn-soft btn-sm" data-action="scene-hint">${Icon.bulb} İpucu</button>`;
  }
  if (scene.type === 'show' || sceneSolved) {
    actions += `<button class="btn btn-primary" data-action="scene-next">${
      isLast ? `${Icon.check} Dersi tamamla` : `Sonraki sahne ${Icon.arrow}`
    }</button>`;
  }

  const clickable = scene.type === 'try' && !sceneSolved;

  return `
    <div class="container" style="padding-top: 32px; padding-bottom: 32px;">
      <div class="lesson-player">
        <div class="lesson-bar">
          <button class="back-link" style="margin:0;" data-action="lesson-exit">${Icon.arrowLeft} Çıkış</button>
          <div style="font-size:12px;color:var(--ink-4);text-transform:uppercase;letter-spacing:0.06em;">
            Sahne ${activeSceneIdx + 1} / ${activeLesson.scenes.length}
          </div>
          <div style="font-size:14px;font-weight:600;">%${Math.round(progress)}</div>
        </div>
        <div class="lesson-progress-track">
          <div class="lesson-progress-fill" style="width:${progress}%"></div>
        </div>
        <div class="lesson-content">
          <div class="lesson-board-wrap">
            ${renderBoard({
              position: scenePos,
              selected: sceneSelected,
              highlights: sceneSolved ? [] : (scene.highlights || []),
              onClick: clickable ? 'scene' : null,
            })}
          </div>
          <div>
            <div class="scene-tag ${scene.type === 'try' ? 'try' : 'show'}">
              ${scene.type === 'try' ? `${Icon.target} Sıra Sende` : `${Icon.book} Anlatım`}
            </div>
            <h2 class="scene-title">${escapeHtml(scene.title)}</h2>
            <p class="scene-text">${escapeHtml(scene.text)}</p>
            ${alertHtml}
            <div class="lesson-actions">${actions}</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function dashboardView() {
  const totalLessonsAvail = Object.values(LESSONS).reduce((s, l) => s + l.length, 0);
  const completed = state.completedLessons.length;
  const enrolled = state.enrolled.length;
  const solved = state.solvedPuzzles.length;
  const streak = calcStreak();

  // Weekly bar data
  const days = ['Paz', 'Pzt', 'Sal', 'Çar', 'Per', 'Cum', 'Cmt'];
  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - now.getDay());
  weekStart.setHours(0, 0, 0, 0);
  const weekly = days.map((d, i) => {
    const start = new Date(weekStart);
    start.setDate(weekStart.getDate() + i);
    const end = new Date(start);
    end.setDate(start.getDate() + 1);
    const dk = state.activity
      .filter(a => a.ts >= start.getTime() && a.ts < end.getTime() && a.type === 'lesson_complete')
      .reduce((s, a) => s + (a.minutes || 0), 0);
    return { d, dk };
  });
  const maxDk = Math.max(1, ...weekly.map(w => w.dk));

  // Skills
  const skillMap = { 'Açılış':0, 'Taktik':0, 'Son Oyun':0, 'Strateji':0, 'Mat':0, 'Hesaplama':0 };
  state.completedLessons.forEach(lid => {
    if (lid.startsWith('opening')) skillMap['Açılış'] += 25;
    if (lid.startsWith('tactics')) skillMap['Taktik'] += 20;
    if (lid.startsWith('endgame')) skillMap['Son Oyun'] += 25;
    if (lid.startsWith('intro')) skillMap['Strateji'] += 10;
  });
  state.solvedPuzzles.forEach(pid => {
    const p = PUZZLES.find(x => x.id === pid);
    if (!p) return;
    if (p.topic.includes('Mat')) skillMap['Mat'] += 12;
    if (['Çatal','Şiş','Çakılma','Çift'].some(x => p.topic.includes(x))) skillMap['Taktik'] += 10;
    skillMap['Hesaplama'] += 6;
  });
  const skills = Object.entries(skillMap).map(([k, v]) => ({ skill: k, value: Math.min(100, v) }));

  // Continue
  let continueLesson = null;
  for (const cid of state.enrolled) {
    const lessons = LESSONS[cid] || [];
    const next = lessons.find(l => !state.completedLessons.includes(l.id));
    if (next) { continueLesson = { courseId: cid, lesson: next, course: COURSES.find(c => c.id === cid) }; break; }
  }

  // Bars
  const barsHtml = weekly.map(w => {
    const h = (w.dk / maxDk) * 160;
    return `
      <div class="bar-col">
        <div class="bar ${w.dk === 0 ? 'empty' : ''}" style="height:${Math.max(4, h)}px">
          ${w.dk > 0 ? `<div class="bar-tooltip">${w.dk} dk</div>` : ''}
        </div>
        <div class="bar-label">${w.d}</div>
      </div>
    `;
  }).join('');

  // Radar SVG
  const cx = 120, cy = 110, R = 80;
  const n = skills.length;
  const ringPaths = [0.25, 0.5, 0.75, 1].map(scale => {
    const r = R * scale;
    const pts = Array.from({ length: n }, (_, i) => {
      const a = (Math.PI * 2 * i) / n - Math.PI / 2;
      return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
    });
    return `<polygon points="${pts.map(p => p.join(',')).join(' ')}" fill="none" stroke="var(--line)" stroke-width="1"/>`;
  }).join('');

  const dataPts = skills.map((s, i) => {
    const a = (Math.PI * 2 * i) / n - Math.PI / 2;
    const r = (R * s.value) / 100;
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  });
  const labels = skills.map((s, i) => {
    const a = (Math.PI * 2 * i) / n - Math.PI / 2;
    const r = R + 18;
    const x = cx + r * Math.cos(a);
    const y = cy + r * Math.sin(a);
    let anchor = 'middle';
    if (Math.cos(a) > 0.5) anchor = 'start';
    else if (Math.cos(a) < -0.5) anchor = 'end';
    return `<text x="${x}" y="${y}" text-anchor="${anchor}" dominant-baseline="middle" font-size="10" fill="var(--ink-4)">${s.skill}</text>`;
  }).join('');

  const radarSvg = `
    <svg viewBox="0 0 240 220" width="100%" height="100%">
      ${ringPaths}
      ${labels}
      <polygon points="${dataPts.map(p => p.join(',')).join(' ')}"
        fill="rgba(10,10,10,0.1)" stroke="var(--ink)" stroke-width="2"/>
      ${dataPts.map(p => `<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="var(--ink)"/>`).join('')}
    </svg>
  `;

  // Activity
  let activityHtml;
  if (!state.activity.length) {
    activityHtml = `<div class="empty">
      <div class="empty-icon">⌛</div>
      <div class="empty-title">Henüz aktivite yok</div>
      <div class="empty-text">Bir derse veya bulmacaya başla — burada görünecek.</div>
    </div>`;
  } else {
    activityHtml = state.activity.slice(0, 8).map(a => {
      let cfg;
      if (a.type === 'lesson_complete') cfg = { i: Icon.checkCircle, t: 'Ders tamamlandı' };
      else if (a.type === 'puzzle_solve') cfg = { i: Icon.trophy, t: 'Bulmaca çözüldü' };
      else if (a.type === 'enroll') cfg = { i: Icon.book, t: 'Yeni kursa kayıt' };
      else cfg = { i: Icon.zap, t: 'Aktivite' };
      return `
        <div class="activity-row">
          <div class="activity-icon">${cfg.i}</div>
          <div class="activity-text">${cfg.t} · <span class="ref">${escapeHtml(a.label || '')}</span></div>
          <div class="activity-time">${timeAgo(a.ts)}</div>
        </div>
      `;
    }).join('');
  }

  return `
    <div class="container" style="padding-top: 40px; padding-bottom: 60px;">
      <div class="dash-header">
        <div>
          <div class="eyebrow">Üye Paneli</div>
          <h1 style="font-size:clamp(36px,5vw,56px);font-weight:500;letter-spacing:-0.03em;line-height:1.05;">
            Hoş geldin,<br><em style="font-style:italic;color:var(--ink-3);font-weight:400;">${escapeHtml(state.user?.name?.split(' ')[0] || 'Misafir')}</em>.
          </h1>
        </div>
        <div class="streak-pill">
          <span style="color:${streak > 0 ? 'var(--warn)' : 'var(--ink-5)'};">${Icon.flame}</span>
          <div>
            <div class="streak-num">${streak} gün</div>
            <div class="streak-label">Çalışma serisi</div>
          </div>
        </div>
      </div>

      <div class="stats-grid">
        ${[
          { i: Icon.book, l: 'Tamamlanan ders', v: completed, s: `${totalLessonsAvail - completed} kaldı` },
          { i: Icon.clock, l: 'Toplam çalışma', v: fmtMin(state.totalMinutes), s: 'Etkin süre' },
          { i: Icon.trophy, l: 'Bulmaca puanı', v: state.rating.toLocaleString('tr-TR'), s: `${solved} bulmaca` },
          { i: Icon.graduation, l: 'Kayıtlı kurs', v: enrolled, s: `${COURSES.length - enrolled} mevcut` },
        ].map(s => `
          <div class="stat-card">
            <div class="stat-card-top">${s.i}</div>
            <div class="stat-card-v">${s.v}</div>
            <div class="stat-card-l">${s.l}</div>
            <div class="stat-card-s">${s.s}</div>
          </div>
        `).join('')}
      </div>

      <div class="panel-grid">
        <div class="panel">
          <div class="panel-title">Bu hafta</div>
          <div class="panel-h">Çalışma süresi (dakika)</div>
          <div class="bars">${barsHtml}</div>
        </div>
        <div class="panel">
          <div class="panel-title">Yetkinlik haritası</div>
          <div class="panel-h">Güçlü ve zayıf yönler</div>
          <div class="radar">${radarSvg}</div>
        </div>
      </div>

      ${continueLesson ? `
        <div class="continue-card">
          <div class="left">
            <div class="continue-icon">${continueLesson.course.icon}</div>
            <div>
              <div class="label-tag">Kaldığın yer</div>
              <div class="title">${escapeHtml(continueLesson.course.title)}</div>
              <div class="sub">${escapeHtml(continueLesson.lesson.title)} · ${continueLesson.lesson.duration} dk</div>
            </div>
          </div>
          <button class="btn btn-primary" data-continue-lesson="${continueLesson.lesson.id}" data-continue-course="${continueLesson.courseId}">
            Devam et ${Icon.arrow}
          </button>
        </div>
      ` : !continueLesson && enrolled === 0 ? `
        <div class="panel" style="text-align:center;padding:48px 24px;margin-bottom:24px;">
          <div class="empty-icon">♟</div>
          <div class="empty-title">Henüz kursa kayıt olmadın</div>
          <div class="empty-text">Bir kurs seç ve ilk dersi tamamla — ilerlemen burada görünecek.</div>
          <button class="btn btn-primary" data-route="courses">Kurslara göz at ${Icon.arrow}</button>
        </div>
      ` : ''}

      <div class="activity">
        <div class="activity-head">
          <div class="panel-title" style="margin:0;">Son aktivite</div>
        </div>
        ${activityHtml}
      </div>
    </div>
  `;
}

          <span>Bütün haklar saklıdır</span>
        </div>
      </div>
    </footer>
  `;
}

// ═══════════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  let pageHtml = '';
  switch (view) {
    case 'home': pageHtml = homeView(); break;
    case 'courses': pageHtml = coursesView(); break;
    case 'course': pageHtml = courseView(); break;
    case 'lesson': pageHtml = lessonView(); break;
    case 'puzzles': pageHtml = puzzlesView(); break;
    case 'dashboard': pageHtml = dashboardView(); break;
    case 'login': pageHtml = loginView(); break;
    default: pageHtml = homeView();
  }
  app.innerHTML = navView() + pageHtml + footerView();
  bindEvents();
}

// ═══════════════════════════════════════════════════════════════
// EVENT BINDING
// ═══════════════════════════════════════════════════════════════
function bindEvents() {
  // Navigation routes
  document.querySelectorAll('[data-route]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      const route = el.getAttribute('data-route');
      if (route === 'puzzles') initPuzzleState();
      setView(route);
    });
  });

  // Filters
  document.querySelectorAll('[data-filter]').forEach(el => {
    el.addEventListener('click', () => {
      courseFilter = el.getAttribute('data-filter');
      render();
    });
  });

  // Course actions
  document.querySelectorAll('[data-open-course]').forEach(el => {
    el.addEventListener('click', () => {
      openCourse(el.getAttribute('data-open-course'));
    });
  });

  document.querySelectorAll('[data-enroll]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.getAttribute('data-enroll');
      const course = COURSES.find(c => c.id === id);
      updateState(s => {
        if (s.enrolled.includes(id)) return s;
        return {
          ...s,
          enrolled: [...s.enrolled, id],
          activity: [
            { ts: Date.now(), type: 'enroll', ref: id, label: course.title },
            ...s.activity,
          ].slice(0, 50),
        };
      });
      openCourse(id);
    });
  });

  document.querySelectorAll('[data-open-lesson]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.getAttribute('data-open-lesson');
      const lesson = (LESSONS[activeCourseId] || []).find(l => l.id === id);
      if (lesson) openLesson(lesson, activeCourseId);
    });
  });

  // Continue from dashboard
  document.querySelectorAll('[data-continue-lesson]').forEach(el => {
    el.addEventListener('click', () => {
      const lid = el.getAttribute('data-continue-lesson');
      const cid = el.getAttribute('data-continue-course');
      const lesson = (LESSONS[cid] || []).find(l => l.id === lid);
      if (lesson) openLesson(lesson, cid);
    });
  });

  // Board clicks
  document.querySelectorAll('[data-board-click]').forEach(el => {
    el.addEventListener('click', () => {
      const target = el.getAttribute('data-board-click');
      const sq = el.getAttribute('data-square');
      if (target === 'scene') handleSceneClick(sq);
      else if (target === 'puzzle') handlePuzzleClick(sq);
    });
  });

  // Generic actions
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      handleAction(el.getAttribute('data-action'));
    });
  });
}

// ═══════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════
function handleAction(action) {
  switch (action) {
    case 'toggle-nav':
      mobileNavOpen = !mobileNavOpen;
      render();
      break;
    case 'logout':
      logout();
      break;
    case 'scene-prev':
      if (activeSceneIdx > 0) {
        activeSceneIdx--;
        initSceneState();
        render();
      }
      break;
    case 'scene-next':
      if (activeSceneIdx === activeLesson.scenes.length - 1) {
        completeLesson();
      } else {
        activeSceneIdx++;
        initSceneState();
        render();
      }
      break;
    case 'scene-hint':
      sceneShowHint = true;
      render();
      break;
    case 'lesson-exit':
      setView(activeCourseId ? 'course' : 'courses');
      break;
    case 'puzzle-prev':
      activePuzzleIdx = (activePuzzleIdx - 1 + PUZZLES.length) % PUZZLES.length;
      initPuzzleState();
      render();
      break;
    case 'puzzle-next':
      activePuzzleIdx = (activePuzzleIdx + 1) % PUZZLES.length;
      initPuzzleState();
      render();
      break;
    case 'puzzle-hint':
      puzzleShowHint = true;
      render();
      break;
    case 'puzzle-reset':
      initPuzzleState();
      render();
      break;
    case 'login-toggle':
      loginMode = loginMode === 'login' ? 'register' : 'login';
      loginErr = '';
      render();
      break;
    case 'login-submit':
      submitLogin();
      break;
  }
}

function handleSceneClick(sq) {
  const scene = activeLesson.scenes[activeSceneIdx];
  if (scene.type !== 'try' || sceneSolved) return;
  if (sceneSelected) {
    const isOwn = scenePos[sq] && isUpper(scenePos[sq]);
    if (sceneSelected === scene.solution.from && sq === scene.solution.to) {
      const np = { ...scenePos };
      np[sq] = np[sceneSelected];
      delete np[sceneSelected];
      scenePos = np;
      sceneSolved = true;
      sceneSelected = null;
      sceneFeedback = { type: 'success', msg: 'Mükemmel hamle!' };
    } else if (isOwn) {
      sceneSelected = sq;
      sceneFeedback = null;
    } else {
      sceneFeedback = { type: 'error', msg: 'Hmm, doğru değil. Tekrar dene.' };
      sceneSelected = null;
    }
  } else if (scenePos[sq] && isUpper(scenePos[sq])) {
    sceneSelected = sq;
  }
  render();
}

function handlePuzzleClick(sq) {
  if (puzzleSolved) return;
  const p = PUZZLES[activePuzzleIdx];
  if (puzzleSelected) {
    const isOwn = puzzlePos[sq] && isUpper(puzzlePos[sq]);
    if (puzzleSelected === p.solution.from && sq === p.solution.to) {
      const np = { ...puzzlePos };
      np[sq] = np[puzzleSelected];
      delete np[puzzleSelected];
      puzzlePos = np;
      puzzleSolved = true;
      puzzleSelected = null;
      puzzleFeedback = { type: 'success', msg: 'Mükemmel — bulmaca çözüldü!' };

      if (!state.solvedPuzzles.includes(p.id)) {
        const award = puzzleAttempts === 0 ? 15 : 8;
        updateState(s => ({
          ...s,
          solvedPuzzles: [...s.solvedPuzzles, p.id],
          rating: s.rating + award,
          activity: [
            { ts: Date.now(), type: 'puzzle_solve', ref: p.id, label: `${p.topic} — ${p.difficulty}` },
            ...s.activity,
          ].slice(0, 50),
        }));
        return; // updateState already calls render
      }
    } else if (isOwn) {
      puzzleSelected = sq;
      puzzleFeedback = null;
    } else {
      puzzleAttempts++;
      updateState(s => ({ ...s, failedPuzzles: s.failedPuzzles + 1 }));
      puzzleFeedback = { type: 'error', msg: 'Hmm, bu çözüm değil. Başka bir hamle dene.' };
      puzzleSelected = null;
      return;
    }
  } else if (puzzlePos[sq] && isUpper(puzzlePos[sq])) {
    puzzleSelected = sq;
  }
  render();
}

function completeLesson() {
  const lesson = activeLesson;
  if (!state.completedLessons.includes(lesson.id)) {
    updateState(s => ({
      ...s,
      completedLessons: [...s.completedLessons, lesson.id],
      totalMinutes: s.totalMinutes + lesson.duration,
      activity: [
        { ts: Date.now(), type: 'lesson_complete', ref: lesson.id, label: lesson.title, minutes: lesson.duration },
        ...s.activity,
      ].slice(0, 50),
    }));
  }
  setView(activeCourseId ? 'course' : 'courses');
}

function submitLogin() {
  const email = document.getElementById('login-email')?.value || '';
  const pw = document.getElementById('login-pw')?.value || '';
  const name = document.getElementById('login-name')?.value || '';

  loginErr = '';
  if (!email || !email.includes('@')) { loginErr = 'Geçerli bir e-posta gir.'; render(); return; }
  if (!pw || pw.length < 4) { loginErr = 'Parola en az 4 karakter olmalı.'; render(); return; }
  if (loginMode === 'register' && !name.trim()) { loginErr = 'Adını gir.'; render(); return; }

  const displayName = name.trim() || email.split('@')[0] || 'Üye';
  updateState(s => ({ ...s, user: { name: displayName, email, joinedAt: Date.now() } }));
  setView('dashboard');
}

// Enter key on login fields
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && view === 'login') {
    const active = document.activeElement;
    if (active && active.tagName === 'INPUT') {
      e.preventDefault();
      submitLogin();
    }
  }
});

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
initPuzzleState(); // pre-init so first render is clean
render();
</script>
</body>
</html>
