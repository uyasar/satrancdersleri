<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkmate Pro Academy | Yönetici Paneli</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-amber { background: linear-gradient(to bottom right, #f59e0b, #d97706); color: #020617; font-weight: 800; transition: all 0.3s; }
        .btn-amber:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(245, 158, 11, 0.2); }
    </style>
</head>
<body class="bg-slate-950">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Firebase Setup
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'chess-academy-final';

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [currentView, setCurrentView] = useState('landing');
            const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
            const [courses, setCourses] = useState([]);
            const [lessons, setLessons] = useState([]);
            const [progress, setProgress] = useState({ completed: [] });

            useEffect(() => {
                auth.onAuthStateChanged(u => {
                    setUser(u);
                    if (u) {
                        db.collection('artifacts').doc(appId).collection('users').doc(u.uid).collection('progress').doc('main')
                            .onSnapshot(doc => doc.exists && setProgress(doc.data()));
                    }
                });

                db.collection('artifacts').doc(appId).collection('public').doc('data').collection('courses')
                    .onSnapshot(snap => setCourses(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                
                db.collection('artifacts').doc(appId).collection('public').doc('data').collection('lessons')
                    .onSnapshot(snap => setLessons(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
            }, []);

            return (
                <div className="min-h-screen">
                    {/* Nav Bar */}
                    <nav className="glass border-b border-white/5 px-6 h-20 flex items-center justify-between sticky top-0 z-50">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => {setCurrentView('landing'); setIsAdminAuthenticated(false);}}>
                            <div className="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center"><Icon name="trophy" className="text-slate-950" /></div>
                            <h1 className="text-xl font-black text-white">CHECKMATE</h1>
                        </div>
                        <div className="flex items-center gap-8">
                            <button onClick={() => {setCurrentView('courses'); setIsAdminAuthenticated(false);}} className="text-xs font-black text-slate-400 hover:text-white uppercase tracking-widest">Kurslar</button>
                            <button onClick={() => {setCurrentView('profile'); setIsAdminAuthenticated(false);}} className="text-xs font-black text-slate-400 hover:text-white uppercase tracking-widest">Gelişim</button>
                            <button onClick={() => setCurrentView('admin-login')} className="text-slate-500 hover:text-amber-500 transition-colors">
                                <Icon name="settings" size={20} />
                            </button>
                        </div>
                    </nav>

                    <main className="container mx-auto px-6 py-10">
                        {currentView === 'landing' && <Landing onStart={() => setCurrentView('courses')} />}
                        {currentView === 'courses' && <Courses courses={courses} onSelect={() => setCurrentView('lesson')} />}
                        {currentView === 'admin-login' && !isAdminAuthenticated && (
                            <AdminLogin onLoginSuccess={() => setIsAdminAuthenticated(true)} />
                        )}
                        {currentView === 'admin-login' && isAdminAuthenticated && (
                            <AdminPanel courses={courses} appId={appId} db={db} onLogout={() => {setIsAdminAuthenticated(false); setCurrentView('landing');}} />
                        )}
                        {currentView === 'profile' && <Profile progress={progress} lessons={lessons} />}
                    </main>
                </div>
            );
        }

        // --- Giriş Ekranı Bileşeni ---
        function AdminLogin({ onLoginSuccess }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                // Basit kontrol - Ümit Bey, burayı kendinize göre değiştirebilirsiniz
                if (username === 'admin' && password === '123456') {
                    onLoginSuccess();
                } else {
                    setError('Kullanıcı adı veya şifre hatalı!');
                }
            };

            return (
                <div className="max-w-md mx-auto mt-20 animate-in fade-in zoom-in-95 duration-300">
                    <div className="glass p-10 rounded-[2.5rem] shadow-2xl border-amber-500/10">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-amber-500/10 text-amber-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                <Icon name="shield-check" size={32} />
                            </div>
                            <h2 className="text-2xl font-black text-white">Yönetici Girişi</h2>
                            <p className="text-slate-500 text-sm mt-1">Lütfen yetkili bilgilerinizi girin.</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-5">
                            <div>
                                <label className="text-[10px] font-black text-slate-500 uppercase ml-2 mb-2 block">Kullanıcı Adı</label>
                                <input 
                                    type="text" 
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    className="w-full p-4 bg-slate-900 border border-white/5 rounded-2xl outline-none focus:border-amber-500 transition-all text-white"
                                    placeholder="admin"
                                />
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-slate-500 uppercase ml-2 mb-2 block">Şifre</label>
                                <input 
                                    type="password" 
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full p-4 bg-slate-900 border border-white/5 rounded-2xl outline-none focus:border-amber-500 transition-all text-white"
                                    placeholder="••••••"
                                />
                            </div>
                            {error && <p className="text-red-500 text-xs text-center font-bold">{error}</p>}
                            <button type="submit" className="w-full py-4 btn-amber rounded-2xl shadow-lg mt-4">GİRİŞ YAP</button>
                        </form>
                    </div>
                </div>
            );
        }

        function AdminPanel({ courses, appId, db, onLogout }) {
            const [isAdding, setIsAdding] = useState(false);
            return (
                <div className="glass rounded-[3rem] p-10 animate-in slide-in-from-bottom-5">
                    <div className="flex justify-between items-center mb-10">
                        <div>
                            <h3 className="text-3xl font-black text-white">Yönetim Masası</h3>
                            <p className="text-slate-500 text-sm">Kursları ve içerikleri buradan yönetin.</p>
                        </div>
                        <div className="flex gap-4">
                            <button onClick={() => setIsAdding(!isAdding)} className="px-6 py-3 btn-amber rounded-xl text-xs">YENİ KURS</button>
                            <button onClick={onLogout} className="px-6 py-3 bg-red-500/10 text-red-500 border border-red-500/20 rounded-xl text-xs font-bold hover:bg-red-500 hover:text-white transition-all">ÇIKIŞ</button>
                        </div>
                    </div>
                    {isAdding && (
                        <form className="grid grid-cols-2 gap-6 p-8 bg-slate-950 rounded-3xl mb-10 border border-amber-500/20">
                            <input name="title" placeholder="Kurs Başlığı" className="p-4 bg-slate-900 border border-white/5 rounded-xl outline-none focus:border-amber-500" />
                            <input name="icon" placeholder="Emoji (🏆)" className="p-4 bg-slate-900 border border-white/5 rounded-xl outline-none focus:border-amber-500" />
                            <button className="col-span-2 py-4 btn-amber rounded-xl uppercase">Sisteme Kaydet</button>
                        </form>
                    )}
                    <div className="space-y-4">
                        {courses.map(c => (
                            <div key={c.id} className="p-6 bg-white/5 rounded-2xl flex justify-between items-center group hover:bg-white/10 transition-all">
                                <div className="flex items-center gap-4">
                                    <span className="text-3xl">{c.icon}</span>
                                    <span className="font-bold text-lg">{c.title}</span>
                                </div>
                                <div className="flex gap-2">
                                    <button className="p-3 text-slate-500 hover:text-amber-500"><Icon name="edit-3" size={18}/></button>
                                    <button className="p-3 text-slate-500 hover:text-red-500"><Icon name="trash-2" size={18}/></button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // Boş Diğer Bileşenler (Önceki kodla aynı)
        function Landing({onStart}){ return <div className="py-20 text-center space-y-8"><h2 className="text-7xl font-black">STRATEJİNİ <br/><span className="text-amber-500">KONUŞTUR.</span></h2><button onClick={onStart} className="px-10 py-5 btn-amber rounded-2xl">BAŞLA</button></div> }
        function Courses({courses}){ return <div className="grid md:grid-cols-3 gap-8">{courses.map(c => <div key={c.id} className="glass p-8 rounded-3xl"><h3 className="text-2xl font-bold">{c.title}</h3></div>)}</div> }
        function Profile({progress}){ return <div className="glass p-12 rounded-[3rem] text-center"><h2 className="text-3xl font-black">GELİŞİMİN</h2><div className="mt-6 text-5xl text-amber-500 font-black">%{progress.completed.length * 10}</div></div> }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
